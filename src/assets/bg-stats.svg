<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para seção estatísticas -->
    <linearGradient id="statsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#f2efe8;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ebe6db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3ddd0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Padrão de gráficos/dados -->
    <pattern id="chartPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="20" y="60" width="8" height="20" fill="#1a4d3a" opacity="0.04"/>
      <rect x="35" y="45" width="8" height="35" fill="#6b9b7a" opacity="0.03"/>
      <rect x="50" y="30" width="8" height="50" fill="#1a4d3a" opacity="0.04"/>
      <rect x="65" y="50" width="8" height="30" fill="#6b9b7a" opacity="0.03"/>
    </pattern>
    
    <!-- Padrão de mapas/geografia -->
    <pattern id="mapPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M50,50 Q80,30 110,50 Q140,70 170,50" stroke="#1a4d3a" stroke-width="1" fill="none" opacity="0.03"/>
      <path d="M30,100 Q60,80 90,100 Q120,120 150,100" stroke="#6b9b7a" stroke-width="1" fill="none" opacity="0.025"/>
      <circle cx="100" cy="75" r="3" fill="#1a4d3a" opacity="0.04"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#statsGradient)"/>
  
  <!-- Padrão de gráficos -->
  <rect width="1920" height="1080" fill="url(#chartPattern)"/>
  
  <!-- Padrão de mapas -->
  <rect width="1920" height="1080" fill="url(#mapPattern)"/>
  
  <!-- Elementos decorativos de dados -->
  <rect x="150" y="200" width="60" height="4" fill="#6b9b7a" opacity="0.04" rx="2"/>
  <rect x="150" y="210" width="80" height="4" fill="#1a4d3a" opacity="0.03" rx="2"/>
  <rect x="150" y="220" width="40" height="4" fill="#6b9b7a" opacity="0.04" rx="2"/>
  
  <rect x="1600" y="700" width="60" height="4" fill="#6b9b7a" opacity="0.04" rx="2"/>
  <rect x="1600" y="710" width="80" height="4" fill="#1a4d3a" opacity="0.03" rx="2"/>
  <rect x="1600" y="720" width="40" height="4" fill="#6b9b7a" opacity="0.04" rx="2"/>
</svg>