<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente escuro para acessibilidade -->
    <linearGradient id="accessibilityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d3a;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#2d5a47;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#1a4d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2e1f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Padrão de acessibilidade -->
    <pattern id="accessPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Símbolo de acessibilidade simplificado -->
      <circle cx="60" cy="45" r="8" fill="#6b9b7a" opacity="0.06"/>
      <path d="M45,60 Q60,50 75,60 L75,80 Q60,90 45,80 Z" fill="#6b9b7a" opacity="0.04"/>
    </pattern>
    
    <!-- Padrão de ondas sonoras -->
    <pattern id="soundPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="15" fill="none" stroke="#6b9b7a" stroke-width="1" opacity="0.05"/>
      <circle cx="40" cy="40" r="25" fill="none" stroke="#6b9b7a" stroke-width="1" opacity="0.03"/>
      <circle cx="40" cy="40" r="35" fill="none" stroke="#6b9b7a" stroke-width="1" opacity="0.02"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#accessibilityGradient)"/>
  
  <!-- Padrão de acessibilidade -->
  <rect width="1920" height="1080" fill="url(#accessPattern)"/>
  
  <!-- Padrão de ondas sonoras -->
  <rect width="1920" height="1080" fill="url(#soundPattern)"/>
  
  <!-- Elementos decorativos -->
  <path d="M200,300 Q250,280 300,300 Q350,320 400,300" stroke="#6b9b7a" stroke-width="2" fill="none" opacity="0.04"/>
  <path d="M1500,700 Q1550,680 1600,700 Q1650,720 1700,700" stroke="#6b9b7a" stroke-width="2" fill="none" opacity="0.04"/>
</svg>