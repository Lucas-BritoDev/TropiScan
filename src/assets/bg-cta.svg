<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para CTA final -->
    <linearGradient id="ctaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#f6f3ec;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#f0ebe0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eae4d7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Padrão de saúde/bem-estar -->
    <pattern id="healthPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Símbolo de saúde -->
      <path d="M45,35 L55,35 L55,45 L65,45 L65,55 L55,55 L55,65 L45,65 L45,55 L35,55 L35,45 L45,45 Z" fill="#1a4d3a" opacity="0.025"/>
      <circle cx="50" cy="50" r="25" fill="none" stroke="#6b9b7a" stroke-width="1" opacity="0.02"/>
    </pattern>
    
    <!-- Padrão de conexões/rede -->
    <pattern id="networkPattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="3" fill="#1a4d3a" opacity="0.03"/>
      <circle cx="100" cy="75" r="3" fill="#6b9b7a" opacity="0.025"/>
      <circle cx="75" cy="100" r="3" fill="#1a4d3a" opacity="0.03"/>
      <line x1="50" y1="50" x2="100" y2="75" stroke="#6b9b7a" stroke-width="1" opacity="0.02"/>
      <line x1="100" y1="75" x2="75" y2="100" stroke="#1a4d3a" stroke-width="1" opacity="0.02"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#ctaGradient)"/>
  
  <!-- Padrão de saúde -->
  <rect width="1920" height="1080" fill="url(#healthPattern)"/>
  
  <!-- Padrão de conexões -->
  <rect width="1920" height="1080" fill="url(#networkPattern)"/>
  
  <!-- Elementos decorativos finais -->
  <ellipse cx="200" cy="300" rx="60" ry="80" fill="#6b9b7a" opacity="0.02" transform="rotate(-10 200 300)"/>
  <ellipse cx="1700" cy="700" rx="70" ry="90" fill="#1a4d3a" opacity="0.015" transform="rotate(15 1700 700)"/>
  <ellipse cx="960" cy="200" rx="50" ry="70" fill="#6b9b7a" opacity="0.02" transform="rotate(30 960 200)"/>
</svg>