<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal tropical elegante -->
    <linearGradient id="tropicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d3a;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#2d5a47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a7c59;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#6b9b7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bb99c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente de overlay -->
    <radialGradient id="overlay" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Padrão de folhas sutis -->
    <pattern id="leafPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M50,50 Q70,30 90,50 Q70,70 50,50" fill="#ffffff" opacity="0.03"/>
      <path d="M150,150 Q170,130 190,150 Q170,170 150,150" fill="#ffffff" opacity="0.03"/>
      <path d="M100,150 Q120,130 140,150 Q120,170 100,150" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#tropicalGradient)"/>
  
  <!-- Padrão de folhas -->
  <rect width="1920" height="1080" fill="url(#leafPattern)"/>
  
  <!-- Overlay para profundidade -->
  <rect width="1920" height="1080" fill="url(#overlay)"/>
  
  <!-- Formas orgânicas sutis -->
  <ellipse cx="300" cy="200" rx="150" ry="100" fill="#ffffff" opacity="0.05" transform="rotate(-15 300 200)"/>
  <ellipse cx="1600" cy="800" rx="200" ry="120" fill="#ffffff" opacity="0.04" transform="rotate(25 1600 800)"/>
  <ellipse cx="800" cy="900" rx="180" ry="90" fill="#ffffff" opacity="0.03" transform="rotate(-10 800 900)"/>
</svg>