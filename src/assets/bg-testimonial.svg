<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para depoimento -->
    <linearGradient id="testimonialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#f4f1ea;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ede8dd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e0d3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Padrão de aspas -->
    <pattern id="quotePattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <path d="M50,50 Q60,40 70,50 Q60,60 50,50 M80,50 Q90,40 100,50 Q90,60 80,50" fill="#1a4d3a" opacity="0.02"/>
    </pattern>
    
    <!-- Padrão de corações/cuidado -->
    <pattern id="carePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M50,35 C45,25 35,25 35,35 C35,45 50,60 50,60 C50,60 65,45 65,35 C65,25 55,25 50,35 Z" fill="#6b9b7a" opacity="0.025"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#testimonialGradient)"/>
  
  <!-- Padrão de aspas -->
  <rect width="1920" height="1080" fill="url(#quotePattern)"/>
  
  <!-- Padrão de cuidado -->
  <rect width="1920" height="1080" fill="url(#carePattern)"/>
  
  <!-- Elementos decorativos -->
  <ellipse cx="300" cy="200" rx="40" ry="60" fill="#6b9b7a" opacity="0.03" transform="rotate(-15 300 200)"/>
  <ellipse cx="1600" cy="800" rx="50" ry="70" fill="#1a4d3a" opacity="0.02" transform="rotate(20 1600 800)"/>
</svg>