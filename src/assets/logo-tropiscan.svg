<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globeGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#4FFFDF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F766E;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FFFDF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0F172A"/>
  
  <!-- Decorative leaves -->
  <path d="M50 50 Q80 30 110 50 Q80 70 50 50" fill="#22C55E" opacity="0.3"/>
  <path d="M700 80 Q730 60 760 80 Q730 100 700 80" fill="#22C55E" opacity="0.2"/>
  <path d="M680 320 Q710 300 740 320 Q710 340 680 320" fill="#16A34A" opacity="0.4"/>
  
  <!-- Globe -->
  <circle cx="180" cy="200" r="80" fill="url(#globeGradient)" filter="url(#glow)"/>
  
  <!-- Globe network lines -->
  <path d="M120 200 Q150 180 180 200 Q210 180 240 200" stroke="#4FFFDF" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M120 200 Q150 220 180 200 Q210 220 240 200" stroke="#4FFFDF" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M180 120 Q160 160 180 200 Q200 160 180 120" stroke="#4FFFDF" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M180 280 Q160 240 180 200 Q200 240 180 280" stroke="#4FFFDF" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Globe continents (simplified) -->
  <path d="M160 180 Q170 170 185 175 Q195 180 190 190 Q180 195 170 190 Q160 185 160 180" fill="#0F766E"/>
  <path d="M170 210 Q180 205 190 210 Q185 220 175 215 Q170 210 170 210" fill="#0F766E"/>
  
  <!-- Connection dots -->
  <circle cx="165" cy="175" r="2" fill="#FBBF24"/>
  <circle cx="185" cy="185" r="2" fill="#FBBF24"/>
  <circle cx="175" cy="210" r="2" fill="#FBBF24"/>
  <circle cx="195" cy="205" r="2" fill="#FBBF24"/>
  
  <!-- Leaf elements around globe -->
  <path d="M140 160 Q150 150 160 160 Q150 170 140 160" fill="#22C55E" opacity="0.7"/>
  <path d="M200 240 Q210 230 220 240 Q210 250 200 240" fill="#16A34A" opacity="0.8"/>
  
  <!-- TropiScan Text -->
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" filter="url(#glow)">TropiScan</text>
  
  <!-- Health subtitle -->
  <text x="320" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#94A3B8" letter-spacing="8px">HEALTH</text>
  
  <!-- Decorative line -->
  <line x1="320" y1="235" x2="620" y2="235" stroke="url(#textGradient)" stroke-width="2"/>
  
  <!-- Additional decorative elements -->
  <circle cx="750" cy="150" r="3" fill="#4FFFDF" opacity="0.6"/>
  <circle cx="760" cy="170" r="2" fill="#00D4AA" opacity="0.8"/>
  <circle cx="740" cy="180" r="2" fill="#22C55E" opacity="0.7"/>
  
  <circle cx="80" cy="300" r="2" fill="#4FFFDF" opacity="0.5"/>
  <circle cx="90" cy="320" r="3" fill="#00D4AA" opacity="0.6"/>
  <circle cx="70" cy="330" r="2" fill="#22C55E" opacity="0.8"/>
</svg>