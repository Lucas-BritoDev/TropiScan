<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para seção missão -->
    <linearGradient id="missionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0ede5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e3d8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Padrão de células/microscópio -->
    <pattern id="cellPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="25" fill="#1a4d3a" opacity="0.03"/>
      <circle cx="60" cy="60" r="15" fill="#6b9b7a" opacity="0.02"/>
      <circle cx="60" cy="60" r="8" fill="#1a4d3a" opacity="0.04"/>
    </pattern>
    
    <!-- Padrão de cruz médica -->
    <pattern id="medicalPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M45,35 L55,35 L55,45 L65,45 L65,55 L55,55 L55,65 L45,65 L45,55 L35,55 L35,45 L45,45 Z" fill="#1a4d3a" opacity="0.02"/>
    </pattern>
  </defs>
  
  <!-- Fundo base -->
  <rect width="1920" height="1080" fill="url(#missionGradient)"/>
  
  <!-- Padrão de células -->
  <rect width="1920" height="1080" fill="url(#cellPattern)"/>
  
  <!-- Padrão médico -->
  <rect width="1920" height="1080" fill="url(#medicalPattern)"/>
  
  <!-- Formas orgânicas sutis -->
  <ellipse cx="200" cy="300" rx="80" ry="120" fill="#6b9b7a" opacity="0.03" transform="rotate(-20 200 300)"/>
  <ellipse cx="1700" cy="700" rx="100" ry="150" fill="#1a4d3a" opacity="0.02" transform="rotate(30 1700 700)"/>
  <ellipse cx="900" cy="200" rx="60" ry="90" fill="#6b9b7a" opacity="0.025" transform="rotate(45 900 200)"/>
</svg>