<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle with tropical green -->
  <circle cx="256" cy="256" r="240" fill="#1a4d3a" stroke="#6b9b7a" stroke-width="8"/>
  
  <!-- Tropical leaf design -->
  <g transform="translate(256,256)">
    <!-- Main leaf -->
    <path d="M-60,-80 Q-20,-120 20,-80 Q60,-40 20,0 Q-20,40 -60,0 Q-100,-40 -60,-80 Z" fill="#6b9b7a"/>
    
    <!-- Leaf veins -->
    <path d="M-40,-60 Q0,-80 40,-60" stroke="#1a4d3a" stroke-width="3" fill="none"/>
    <path d="M-40,-20 Q0,-40 40,-20" stroke="#1a4d3a" stroke-width="2" fill="none"/>
    <path d="M-40,20 Q0,0 40,20" stroke="#1a4d3a" stroke-width="2" fill="none"/>
    
    <!-- Medical cross symbol -->
    <g transform="translate(0,60)">
      <rect x="-20" y="-8" width="40" height="16" fill="white" rx="2"/>
      <rect x="-8" y="-20" width="16" height="40" fill="white" rx="2"/>
    </g>
    
    <!-- TropiScan text -->
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">TS</text>
  </g>
  
  <!-- Border highlight -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
</svg>