<!DOCTYPE html>
<html>
<head>
    <title>TropiScan Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .icon-preview { margin: 20px 0; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; background: #1a4d3a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #6b9b7a; }
    </style>
</head>
<body>
    <h1>TropiScan PWA Icon Generator</h1>
    <p>This tool generates PWA icons from the TropiScan SVG logo.</p>
    
    <div class="icon-preview">
        <h3>Preview:</h3>
        <img src="tropiscan-icon.svg" width="192" height="192" alt="TropiScan Icon">
    </div>
    
    <div>
        <h3>Generate Icons:</h3>
        <button onclick="generateIcon(192)">Generate 192x192 PNG</button>
        <button onclick="generateIcon(512)">Generate 512x512 PNG</button>
        <button onclick="generateFavicon()">Generate Favicon ICO</button>
    </div>
    
    <div id="canvases"></div>
    
    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                
                // Create download link
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `icon-${size}.png`;
                    a.textContent = `Download icon-${size}.png`;
                    a.style.display = 'block';
                    a.style.margin = '10px 0';
                    document.getElementById('canvases').appendChild(a);
                    a.click();
                });
            };
            img.src = 'tropiscan-icon.svg';
            
            document.getElementById('canvases').appendChild(canvas);
        }
        
        function generateFavicon() {
            // For favicon, we'll generate a 32x32 version
            generateIcon(32);
        }
    </script>
</body>
</html>
